<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STTP2B Management Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <div class="header-title-wrapper">
                    <img src="assets/logo.png" alt="STTP2B Logo" class="app-logo" onerror="this.style.display='none'">
                    <h1>STTP2B Project Management Hub</h1>
                </div>
            </div>
            <div class="header-right">
                <select id="layoutSelect" class="layout-select">
                    <option value="layout-list" data-i18n="layoutList">List</option>
                    <option value="layout-grid-3" data-i18n="layoutGrid3">3 per row</option>
                    <option value="layout-grid-4" data-i18n="layoutGrid4">4 per row</option>
                    <option value="layout-grid-8" data-i18n="layoutGrid8">8 per row</option>
                </select>
                <div class="divider"></div>
                <button id="themeToggleBtn" class="btn-icon" title="Toggle Theme"><i
                        class="fa-solid fa-moon"></i></button>
                <div class="divider"></div>
                <button id="editModeBtn" class="btn-icon" title="Toggle Edit Mode"><i class="fa-solid fa-lock"></i></button>
            </div>
        </header>

        <main id="mainContent">
            <!-- Categories will be injected here -->
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <h2 id="catModalTitle" data-i18n="addCategory">Add Category</h2>
            <form id="categoryForm">
                <input type="hidden" id="catId">
                <div class="form-group">
                    <label for="catName" data-i18n="categoryName">Category Name</label>
                    <input type="text" id="catName" required placeholder="e.g. Work Tools">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('categoryModal')"
                        data-i18n="cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" data-i18n="save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="linkModal">
        <div class="modal">
            <h2 id="linkModalTitle" data-i18n="addLink">Add Link</h2>
            <form id="linkForm">
                <input type="hidden" id="linkCategoryId">
                <input type="hidden" id="linkId">
                <div class="form-group">
                    <label for="linkTitle" data-i18n="title">Title</label>
                    <input type="text" id="linkTitle" required placeholder="e.g. GitHub">
                </div>
                <div class="form-group">
                    <label for="linkUrl" data-i18n="url">URL</label>
                    <input type="url" id="linkUrl" required placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="linkIcon" data-i18n="iconUrl">Icon URL (optional)</label>
                    <input type="url" id="linkIcon" placeholder="https://...">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('linkModal')"
                        data-i18n="cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" data-i18n="save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="pinModal">
        <div class="modal">
            <h2 id="pinModalTitle" data-i18n="enterPin">Enter PIN</h2>
            <form id="pinForm">
                <div class="form-group">
                    <label for="pinInput" data-i18n="pin">PIN</label>
                    <input type="password" id="pinInput" required placeholder="******">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('pinModal')"
                        data-i18n="cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" data-i18n="unlock">Unlock</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
